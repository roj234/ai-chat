name: Build

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag (例如 v1.0.0)'
        required: false
        default: ''

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[pre]')

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: packages/ai-chat

      - name: Checkout unconscious
        uses: actions/checkout@v6
        with:
          path: packages/unconscious
          repository: roj234/unconscious

      - name: Checkout streaming-markdown
        uses: actions/checkout@v6
        with:
          path: packages/streaming-markdown
          repository: roj234/streaming-markdown

      - name: Setup environment
        run: |
          echo '{ "private": true, "workspaces": ["packages/*"] }' > package.json
          echo "BUILD_NUMBER=${{ github.run_number }}" >> $GITHUB_ENV

          cd packages/ai-chat
          VERSION_NAME=$(jq -r '.version' package.json)
          VERSION="${{ github.run_number }}"

          sed -i \
            -e "s/{{VERSION_NAME}}/${VERSION_NAME}/g" \
            -e "s/{{VERSION}}/${VERSION}/g" \
            misc/android-config/config.json

          echo "✅ 替换完成：VERSION=${VERSION}  VERSION_NAME=${VERSION_NAME}"

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build
        working-directory: packages/ai-chat

      - name: Build frontend (app)
        run: npm run build:app
        working-directory: packages/ai-chat

      - name: Upload Android assets
        uses: actions/upload-artifact@v4
        with:
          name: android-assets
          path: packages/ai-chat/dist-app/
          if-no-files-found: error

      - name: Upload Android config
        uses: actions/upload-artifact@v4
        with:
          name: android-config
          path: packages/ai-chat/misc/android-config/
          if-no-files-found: error

      - name: Prepare Release Folder
        run: |
          cd packages/ai-chat
          mkdir ai-chat
          
          cp dist/dist.brip ai-chat
          cp dist/server.js ai-chat
          cp backend/config.example.js ai-chat
          cp backend/package.json ai-chat
          cp misc/launch.bat ai-chat
          cp misc/launch.sh ai-chat
          zip -r ./full_release.zip ./ai-chat

      - name: Upload full_release.zip
        uses: actions/upload-artifact@v7
        with:
          name: release
          path: packages/ai-chat/full_release.zip

      - name: Upload dist.zip
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: packages/ai-chat/dist/dist.zip

  build-apk:
    needs: build
    uses: roj234/webview-app/.github/workflows/build.yml@master
    with:
      config_artifact: android-config
      assets_artifact: android-assets
    secrets: inherit

  deploy:
    needs:
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Download frontend package
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: .

      - name: Unzip Release
        run: |
          mkdir dist
          unzip -qq -o dist.zip -d dist -x "/INFO" || [[ $? -eq 1 ]]

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  release:
    needs:
      - build
      - build-apk
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' || 
      contains(github.event.head_commit.message, '[release]')

    steps:
      - name: Download release package
        uses: actions/download-artifact@v4
        with:
          name: release
          path: release-files

      - name: Download frontend package
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: release-files

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-apk.outputs.apk_artifact_name }}
          path: release-files

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || format('v{0}', github.run_number) }}
          name: ${{ github.event.inputs.tag_name || format('b{0}', github.run_number) }}
          body: |
            ${{ github.event.head_commit.message }}
          files: |
            release-files/*.zip
            release-files/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}