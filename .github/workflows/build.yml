name: Build

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag (例如 v1.0.0)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[pre]')

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: packages/ai-chat

      - name: Clone unconscious
        run: git clone https://github.com/roj234/unconscious.git packages/unconscious

      - name: Clone streaming-markdown
        run: git clone https://github.com/roj234/streaming-markdown.git packages/streaming-markdown

      - name: Setup monorepo root
        run: |
          echo '{ "private": true, "workspaces": ["packages/*"] }' > package.json

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build
        working-directory: packages/ai-chat

      - name: Build frontend (app)
        run: npm run build:app
        working-directory: packages/ai-chat

      - name: Upload Android assets
        uses: actions/upload-artifact@v4
        with:
          name: android-assets
          path: packages/ai-chat/dist-app/
          if-no-files-found: error

      - name: Upload Android config
        uses: actions/upload-artifact@v4
        with:
          name: android-config
          path: packages/ai-chat/android-config/
          if-no-files-found: error

      - name: Prepare Release Folder
        run: |
          cd packages/ai-chat
          mkdir ai-chat
          
          cd dist
          zip -r ../ai-chat/dist.zip . -x "server.js"
          cd ..
          
          cp dist/server.js ai-chat
          cp backend/config.example.js ai-chat
          cp backend/package.json ai-chat
          cp misc/launch.bat ai-chat
          cp misc/launch.sh ai-chat
          zip -r ./full_release.zip ./ai-chat

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: release
          path: packages/ai-chat/full_release.zip

  build-apk:
    needs: build
    uses: roj234/webview-app/.github/workflows/build.yml@master
    with:
      config_artifact: android-config
      assets_artifact: android-assets
    secrets: inherit

  release:
    needs:
      - build
      - build-apk
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' || 
      contains(github.event.head_commit.message, '[release]')

    steps:
      - name: Download release package
        uses: actions/download-artifact@v4
        with:
          name: release
          path: release-files

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-apk.outputs.apk_artifact_name }}
          path: release-files

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || format('v{0}', github.run_number) }}
          name: ${{ github.event.inputs.tag_name || format('b{0}', github.run_number) }}
          body: |
            ${{ github.event.head_commit.message }}
          files: |
            release-files/full_release.zip
            release-files/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}